query search_details_by_series_id ($series_id: Int) {
  Media (id: $series_id, type: MANGA) {
    id
    volumes
    siteUrl
    title {
      romaji
      english
    }
    status
    isAdult
    averageScore
    studios {
      edges {
        node {
          name
        }
      }
    }
    staff {
      edges {
        role
        node {
          name {
            full
          }
        }
      }
    }
    genres
    tags {
      name
    }
    description
    startDate {
      day
      month
      year
    }
  }
}
